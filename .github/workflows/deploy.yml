name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Application to deploy'
        required: true
        type: choice
        options:
          - official-website
          - dr-andre-landing-page
          - base-backend
          - lexcare_ai2
          - lexcare-whatsapp-bot

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.app }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Set Environment Variables
        run: |
          echo "DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }}" >> $GITHUB_ENV
          echo "DOPPLER_PROJECT=lexrunit" >> $GITHUB_ENV
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DOPPLER_CONFIG=prd" >> $GITHUB_ENV
            echo "PROJECT_ENV_SUFFIX=" >> $GITHUB_ENV
          else
            echo "DOPPLER_CONFIG=stg" >> $GITHUB_ENV
            echo "PROJECT_ENV_SUFFIX=-stg" >> $GITHUB_ENV
          fi
          
          if [ "${{ github.event.inputs.app }}" = "official-website" ]; then
            echo "CF_PROJECT_NAME=lexrunit-official-website" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.app }}" = "dr-andre-landing-page" ]; then
            echo "CF_PROJECT_NAME=lexrunit-dr-andre-landing-page" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.app }}" = "base-backend" ]; then
            echo "CF_PROJECT_NAME=lexrunit-base-backend" >> $GITHUB_ENV
          else
            echo "CF_PROJECT_NAME=${{ github.event.inputs.app }}" >> $GITHUB_ENV
          fi

      - name: Install Python Dependencies & Run DB Setup
        run: |
          echo "Installing dependencies for db-setup-script..."
          if [ -f "base-backend/requirements.txt" ]; then
            pip install -r base-backend/requirements.txt
          else
            pip install appwrite
          fi
          echo "Running database setup script..."
          doppler run -- python db-setup-script.py

      - name: Build and Deploy (Frontend)
        if: ${{ github.event.inputs.app == 'official-website' || github.event.inputs.app == 'dr-andre-landing-page' }}
        working-directory: ./${{ github.event.inputs.app }}
        run: |
          pnpm install
          doppler run -- pnpm run build
          
          # Copy index.html to 200.html to support SPA fallback routing without causing infinite redirect loops
          if [ -f "dist/index.html" ]; then
            cp dist/index.html dist/200.html
          fi
          
          FULL_PROJECT_NAME="${{ env.CF_PROJECT_NAME }}${{ env.PROJECT_ENV_SUFFIX }}"
          echo "Deploying to $FULL_PROJECT_NAME on Cloudflare Workers..."
          
          # Deploying as a worker (assuming project has a wrangler.toml or is compatible with direct deployment)
          doppler run -- npx wrangler deploy --assets dist --name "$FULL_PROJECT_NAME" --compatibility-date 2026-06-24

      - name: Deploy (Backend / AI / Bot)
        if: ${{ github.event.inputs.app == 'base-backend' || github.event.inputs.app == 'lexcare_ai2' || github.event.inputs.app == 'lexcare-whatsapp-bot' }}
        working-directory: ./${{ github.event.inputs.app }}
        run: |
          # If there is a build step for the backend before deploying to Cloudflare Workers (e.g. edge functions), add it here.
          # Otherwise, this deploys the backend to Cloudflare Workers.
          
          FULL_PROJECT_NAME="${{ env.CF_PROJECT_NAME }}${{ env.PROJECT_ENV_SUFFIX }}"
          echo "Deploying to $FULL_PROJECT_NAME on Cloudflare Workers..."
          
          # Auto-generate wrangler.toml for Python Workers if not present
          if [ ! -f "wrangler.toml" ]; then
            echo "Creating wrangler.toml for Python Worker..."
            echo "name = \"$FULL_PROJECT_NAME\"" > wrangler.toml
            echo "compatibility_date = \"2026-06-24\"" >> wrangler.toml
            echo "compatibility_flags = [\"python_workers\"]" >> wrangler.toml
          fi
            
          # Auto-generate pyproject.toml for pywrangler if not present
          if [ ! -f "pyproject.toml" ] && [ -f "requirements.txt" ]; then
            echo "Creating pyproject.toml for Python Worker..."
            echo "[project]" > pyproject.toml
            echo "name = \"$FULL_PROJECT_NAME\"" >> pyproject.toml
            echo "version = \"0.1.0\"" >> pyproject.toml
            echo "requires-python = \">=3.12\"" >> pyproject.toml
            echo "dependencies = [" >> pyproject.toml
            # Read requirements.txt, ignore comments and empty lines, strip whitespace
            grep -v '^\s*#' requirements.txt | grep -v '^\s*$' | awk '{print "  \"" $1 "\","}' >> pyproject.toml
            echo "]" >> pyproject.toml
            echo "" >> pyproject.toml
            echo "[dependency-groups]" >> pyproject.toml
            echo "dev = [\"workers-py\", \"workers-runtime-sdk\"]" >> pyproject.toml
          fi
          
          # Ensure there's a main.py entrypoint at root
          if [ ! -f "main.py" ]; then
            if [ -f "app/main.py" ]; then
              echo "from app.main import app" > main.py
              echo "__all__ = ['app']" >> main.py
            fi
          fi
          
          # Install uv and deploy using pywrangler
          echo "Installing uv and pywrangler..."
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          uv sync || true
          uv tool install workers-py
          
          # Deploying as a Python worker
          doppler run -- uv run pywrangler deploy
