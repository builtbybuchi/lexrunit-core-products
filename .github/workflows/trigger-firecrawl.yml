name: Trigger Firecrawl Knowledge Update

on:
  # 1. AUTOMATIC: Runs at midnight on the 1st of every month
  schedule:
    - cron: '0 0 1 * *'
  
  # 2. MANUAL: Allows you to click a button in GitHub to run it instantly
  workflow_dispatch:

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
        
      - name: Trigger Firecrawl Async Scrape
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --config prd --project lexrunit -- sh -c '
            # Parse the JSON array and loop over each entry
            jq -c ".[]" knowledge-sources.json | while read -r item; do
              TYPE=$(echo "$item" | jq -r ".type")
              URL=$(echo "$item" | jq -r ".url")
              
              if [ "$TYPE" = "crawl" ]; then
                ENDPOINT="https://api.firecrawl.dev/v1/crawl"
                PAYLOAD="{\"url\": \"$URL\", \"webhook\": \"${VITE_BASE_BACKEND_URL}/api/v1/ai/firecrawl-webhook\"}"
              else
                ENDPOINT="https://api.firecrawl.dev/v1/batch/scrape"
                PAYLOAD="{\"urls\": [\"$URL\"], \"formats\": [\"markdown\"], \"webhook\": \"${VITE_BASE_BACKEND_URL}/api/v1/ai/firecrawl-webhook\"}"
              fi
              
              echo "Triggering Firecrawl $TYPE for $URL..."
              curl -X POST "$ENDPOINT" \
              -H "Authorization: Bearer $FIRECRAWL_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
              
              echo ""
              # Sleep a few seconds to avoid hitting sudden rate limits if the file is large
              sleep 2
            done
          '